<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>diffui-blob — demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light;
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      body {
        margin: 0;
        padding: 48px;
        background: #ffffff;
        color: #0a0a0a;
        min-height: 100vh;
        box-sizing: border-box;
      }
      h1 {
        font-size: 14px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        font-weight: 400;
        margin: 0 0 32px;
      }
      .row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 48px;
        margin-bottom: 48px;
      }
      .cell {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
      }
      .cell__label {
        font-size: 10px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: rgba(10, 10, 10, 0.55);
      }
      diffui-blob {
        width: 220px;
        height: 220px;
      }
    </style>
  </head>
  <body>
    <h1>diffui-blob — demo</h1>

    <div class="row">
      <div class="cell">
        <diffui-blob></diffui-blob>
        <span class="cell__label">complex / BLUE</span>
      </div>
      <div class="cell">
        <diffui-blob color-mode="2"></diffui-blob>
        <span class="cell__label">complex / DARK</span>
      </div>
      <div class="cell">
        <diffui-blob simple energy="1.0"></diffui-blob>
        <span class="cell__label">simple / BLUE / energy 1.0</span>
      </div>
      <div class="cell">
        <diffui-blob simple energy="0.25" color-mode="2"></diffui-blob>
        <span class="cell__label">simple / DARK / energy 0.25</span>
      </div>
    </div>

    <script type="module" src="./diffui-blob.js"></script>
  </body>
</html>
